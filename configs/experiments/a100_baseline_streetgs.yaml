_BASE_: ../base/geoguardgs_base.yaml
exp_name: a100_baseline_streetgs
model_path: outputs/a100_main_experiments/streetgs_original_baseline
data:
  use_colmap: true
  filter_colmap: true
  allow_lidar_initialization: true
  require_no_lidar_initialization: false
  initialization_note: streetgs_original_colmap_lidar_object_initialization
model:
  nsg:
    include_obj: true
    include_sky: true
train:
  guided_feedback:
    enabled: false
    use_lidar_depth: true
    use_da3_structure: false
  feedback_controller:
    enabled: false
    mode: "off"
  gaussian_control:
    enabled: false
    control_mode: "off"
optim:
  lambda_depth_lidar: 0.1
